<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Todo App</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f2f2f2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:white;
  padding:20px;
  width:350px;
  border-radius:8px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
  text-align:center;
}

.input-box{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:8px;
}

button{
  padding:8px 12px;
  background:#007bff;
  color:white;
  border:none;
  cursor:pointer;
}

ul{
  list-style:none;
  padding:0;
  margin-top:20px;
}

li{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #ddd;
}

.delete{
  color:red;
  cursor:pointer;
}
</style>

</head>
<body>

<div class="container">
<h2>Todo App</h2>

<div class="input-box">
<input type="text" id="taskInput" placeholder="Enter task">
<button onclick="addTask()">Add</button>
</div>

<ul id="taskList"></ul>

</div>

<script>
function addTask(){

let input = document.getElementById("taskInput");
let task = input.value.trim();

if(task === "") return;

let li = document.createElement("li");
li.textContent = task;

let del = document.createElement("span");
del.textContent = "Delete";
del.className = "delete";

del.onclick = function(){
li.remove();
}

li.appendChild(del);

document.getElementById("taskList").appendChild(li);

input.value="";
}
</script>

</body>
</html>
